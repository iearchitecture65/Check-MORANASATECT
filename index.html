<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">

    <title>ThesisCheck - ระบบตรวจสอบข้อมูลวิทยานิพนธ์</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->

    <!-- Google Fonts -->

    <!-- Export Libraries -->

    <script>

                    animation: {
                        'fade-in-up': 'fadeInUp 0.4s ease-out forwards',

                    },
                    keyframes: {
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(15px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },

                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Prompt', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            height: 100dvh; 
            background-color: #f8fafc; 
            margin: 0; 
            padding: 0; 
        }
        #app { 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            background-color: #f8fafc;
        }
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
            scroll-behavior: smooth;
        }
        .safe-pt { padding-top: env(safe-area-inset-top); }
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .page-transition { animation: fadeInUp 0.3s ease-out forwards; }
        
        /* Glass effect for sticky action button */
        .glass-bottom {
            background: linear-gradient(to top, rgba(248,250,252,1) 60%, rgba(248,250,252,0) 100%);
        }

        .fade-in { animation: fadeIn 0.3s ease-in-out; }

<body class="text-slate-900">

    <div id="app">
        <div class="flex flex-col items-center justify-center h-full text-indigo-600 gap-4">
            <div class="animate-spin rounded-full h-12 w-12 border-t-4 border-indigo-600 border-opacity-30"></div>
            <p class="font-bold text-sm tracking-widest uppercase animate-pulse">กำลังโหลดระบบ...</p>
        </div>
    </div>
    
    <div id="modal-container"></div>
    <div id="preview-modal-container"></div>

    <!-- Hidden Renderer (สำหรับเรนเดอร์รูปภาพโดยไม่ให้หน้าเว็บเพี้ยน) -->
    <div id="offscreenRenderer" style="position: fixed; top: 0; left: -3000vw; z-index: -9999; pointer-events: none; opacity: 0;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, collection, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";

        // ตั้งค่าเชื่อมต่อฐานข้อมูล Firebase ของคุณ (moranasatect)
        const firebaseConfig = {
            apiKey: "AIzaSyD1z-AufMcsNqnbm3uUjoniuhdmDksYHMY",
            authDomain: "moranasatect.firebaseapp.com",
            projectId: "moranasatect",
            storageBucket: "moranasatect.firebasestorage.app",
            messagingSenderId: "592676930184",
            appId: "1:592676930184:web:a142d92aace735cff5153d",
            measurementId: "G-WY21FBFBPB"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = 'thesis-check-app';

        // Google Sheet CSV Export URL
        const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRyI-a9eEarynPfuWWbpTqHvz-vDHBGnE1UnvqvDOGIAA9nWybOkfS2jlI3xJRrpFAuR5nmWup9169/pub?gid=1223023440&single=true&output=csv";

        window.state = {
            view: 'login', 
            user: null,
            studentId: '',
            isAdmin: false,
            sheetData: [],
            currentStudentData: null,
            settings: { editFormUrl: "" },
            confirmations: {}, 
            isLoading: true,
            modal: { show: false, title: '', message: '', type: 'info' },
            showPreviewModal: false // สถานะโชว์หน้าต่างพรีวิว
        };

        window.cachedExportDataURLs = []; // สำหรับเก็บข้อมูลภาพที่จะส่งออก

        // ฟังก์ชันสำหรับแปลงข้อความที่มีลิงก์ ให้สามารถคลิกได้
        window.formatValue = (text) => {
            if (!text || text.trim() === '') return '<span class="text-slate-300 italic">ไม่มีข้อมูล</span>';
            let safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            safeText = safeText.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank" class="text-indigo-500 underline hover:text-indigo-700 break-all font-medium inline-flex items-center gap-1"><i data-lucide="external-link" class="w-3 h-3"></i> ${url}</a>`;
            });
            safeText = safeText.replace(/\n/g, '<br>');
            return safeText;
        };

        // --- CSV Parser ---
        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        // --- Data Fetching ---
        async function fetchSheetData(isBackgroundPoll = false) {
            try {
                const fetchUrl = SHEET_CSV_URL + "&t=" + new Date().getTime();
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("HTTP Status " + response.status);
                const csvText = await response.text();
                const parsed = parseCSV(csvText);
                
                if (parsed.length > 0) {
                    const headers = parsed[0];
                    const dataRows = parsed.slice(1);
                    const prefixes = ['1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '3.1', '3.2', '3.3'];
                    const headerMap = {};
                    prefixes.forEach(p => headerMap[p] = []);

                    headers.forEach((header, index) => {
                        prefixes.forEach(p => { if (header.includes(p)) headerMap[p].push(index); });
                    });

                    const newData = dataRows.map(row => {
                        let obj = {};
                        prefixes.forEach(p => {
                            let values = headerMap[p].map(idx => row[idx] ? row[idx].trim() : '').filter(v => v !== '');
                            obj[p] = values.join('\n\n'); 
                        });
                        return obj;
                    }).filter(row => row['1.1'] && row['1.1'] !== '');

                    const isDataChanged = JSON.stringify(window.state.sheetData) !== JSON.stringify(newData);

                    if (isDataChanged && newData.length > 0) {
                        window.state.sheetData = newData;
                        if (window.state.view === 'student' && window.state.studentId) {
                            window.state.currentStudentData = window.state.sheetData.find(row => row['1.1'] === window.state.studentId) || window.state.currentStudentData;
                        }
                        if (!window.state.isLoading) window.softUpdateUI();
                    }
                }
            } catch (error) {
                if (!isBackgroundPoll) {
                    console.error("Error fetching sheet:", error);
                    window.state.sheetData = [
                        { "1.1": "65030001", "1.2": "นายใจดี เรียนเก่ง (ดี)", "1.3": "IG: jaidee_th\nhttps://instagram.com", "2.1": "การศึกษา AI (Study of AI)", "2.2": "ผศ.ดร.สมชาย ใจมั่น", "2.3": "วิจัยเชิงทดลอง", "3.1": "https://drive.google.com/drive/1", "3.2": "https://drive.google.com/drive/2", "3.3": "https://drive.google.com/drive/3" }
                    ];
                    if(window.state.isLoading) {
                        window.uiAlert("เกิดข้อผิดพลาดในการโหลดข้อมูลจริง กำลังแสดงข้อมูลจำลองเพื่อการทดสอบ", "info");
                    }
                }
            }
        }

        // --- Firebase Initialization & Listening ---
        async function init() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } 
                    catch (customTokenError) { await signInAnonymously(auth); }
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (u) => {
                    window.state.user = u;
                    if (u) {
                        await fetchSheetData(false); 
                        listenToData();

                        const pollData = async () => {
                            await fetchSheetData(true); 
                            window.pollingTimer = setTimeout(pollData, 3000);
                        };
                        if (window.pollingTimer) clearTimeout(window.pollingTimer);
                        window.pollingTimer = setTimeout(pollData, 3000);
                    }
                });
            } catch (err) { 
                console.error("Firebase Auth Error:", err);
                window.state.isLoading = false;
                render();
            }
        }

        function listenToData() {
            if (!window.state.user) return;
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                if (s.exists()) window.state.settings = { ...window.state.settings, ...s.data() };
                if (window.state.isLoading) {
                    window.state.isLoading = false;
                    render();
                } else {
                    window.softUpdateUI();
                }
            }, (error) => { console.error("Snapshot error:", error); window.state.isLoading = false; render(); });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'confirmations'), (s) => {
                if (s.exists()) window.state.confirmations = s.data();
                if (!window.state.isLoading) window.softUpdateUI();
            }, (error) => { console.error("Snapshot error:", error); });
        }

        // --- Actions ---
        window.handleLogin = (e) => {
            e.preventDefault();
            const input = document.getElementById('login_id').value.trim();
            if (input === "65030900") {
                window.state.isAdmin = true;
                window.state.studentId = "ADMIN";
                window.state.view = 'admin';
            } else {
                const student = window.state.sheetData.find(row => row['1.1'] === input);
                if (student) {
                    window.state.isAdmin = false;
                    window.state.studentId = input;
                    window.state.currentStudentData = student;
                    window.state.view = 'student';
                } else {
                    return window.uiAlert("ไม่พบข้อมูลรหัสนักศึกษานี้ในระบบ", "error");
                }
            }
            render();
        };

        window.logout = () => {
            window.state.view = 'login';
            window.state.studentId = '';
            window.state.isAdmin = false;
            window.state.currentStudentData = null;
            render();
        };

        window.toggleConfirmation = async (section) => {
            if (!window.state.user) return;
            const sid = window.state.studentId;
            let currentData = window.state.confirmations[sid] || { s1: false, s2: false, s3: false };
            let updatedData = { ...currentData, [section]: !currentData[section] };
            let newConfirmations = { ...window.state.confirmations, [sid]: updatedData };
            window.state.confirmations = newConfirmations;
            window.softUpdateUI();

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'confirmations'), newConfirmations, { merge: true });
            } catch (err) {
                console.error("Save error:", err);
                window.uiAlert("เกิดข้อผิดพลาดในการบันทึกข้อมูล", "error");
            }
        };

        window.softUpdateUI = () => {
            if (window.state.view === 'student' && window.state.currentStudentData) {
                const data = window.state.currentStudentData;
                const fields = ['1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '3.1', '3.2', '3.3'];
                fields.forEach(id => {
                    const el = document.getElementById(`val-${id.replace('.', '-')}`);
                    if (el) {
                        el.innerHTML = window.formatValue(data[id]);
                        lucide.createIcons({root: el});
                    }
                });

                const sid = window.state.studentId;
                const myConf = window.state.confirmations[sid] || { s1: false, s2: false, s3: false };
                const isAllConfirmed = myConf.s1 && myConf.s2 && myConf.s3;

                ['s1', 's2', 's3'].forEach(key => {
                    const btn = document.getElementById(`btn-conf-${key}`);
                    const card = document.getElementById(`card-${key}`);
                    const iconBox = document.getElementById(`icon-box-${key}`);
                    if (btn && card && iconBox) {
                        const isConf = myConf[key];
                        card.className = `bg-white p-6 rounded-[2rem] border ${isConf ? 'border-green-400 ring-4 ring-green-50' : 'border-slate-200'} shadow-sm transition-all duration-300`;
                        iconBox.className = `w-10 h-10 ${isConf ? 'bg-green-100 text-green-600' : 'bg-indigo-50 text-indigo-600'} rounded-xl flex items-center justify-center transition-all`;
                        btn.className = `w-full py-4 rounded-xl font-bold flex items-center justify-center gap-3 transition-all active:scale-[0.98] ${isConf ? 'bg-green-500 text-white shadow-lg shadow-green-200 border-b-4 border-green-700' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`;
                        btn.innerHTML = `<i data-lucide="${isConf ? 'check-square' : 'square'}" size="20"></i><span>${isConf ? 'ยืนยันความถูกต้องแล้ว' : 'คลิกเพื่อยืนยันว่าข้อมูลถูกต้อง'}</span>`;
                    }
                });

                const editBtn = document.getElementById('student-edit-btn');
                if (editBtn) {
                    editBtn.href = window.state.settings.editFormUrl || '#';
                    editBtn.onclick = window.state.settings.editFormUrl ? null : (e) => { e.preventDefault(); window.uiAlert('แอดมินยังไม่ได้ตั้งค่าลิงก์แก้ไขข้อมูล', 'error'); };
                }

                const bottomBar = document.getElementById('student-status-btn');
                if (bottomBar) {
                    if (isAllConfirmed) {
                        bottomBar.outerHTML = `<button id="student-status-btn" onclick="window.uiAlert('คุณได้ยืนยันข้อมูลครบถ้วนทั้ง 3 ส่วนเรียบร้อยแล้ว ขอบคุณครับ', 'success')" class="flex-1 py-4 bg-green-500 text-white font-bold rounded-2xl shadow-xl border-b-4 border-green-700 hover:bg-green-600 active:scale-[0.98] flex items-center justify-center gap-2 text-sm uppercase tracking-widest cursor-pointer transition-all"><i data-lucide="check-circle-2" size="18"></i> ยืนยันครบถ้วน</button>`;
                    } else {
                        bottomBar.outerHTML = `<div id="student-status-btn" class="flex-1 py-4 bg-slate-200 text-slate-400 font-bold rounded-2xl shadow-sm flex items-center justify-center gap-2 text-[11px] uppercase tracking-widest cursor-not-allowed transition-all">โปรดยืนยันให้ครบ 3 ส่วน</div>`;
                    }
                }
                lucide.createIcons();
                
            } else if (window.state.view === 'admin') {
                const students = window.state.sheetData;
                let confirmedCount = 0;
                const studentStatusList = students.map(s => {
                    const sid = s['1.1'];
                    const conf = window.state.confirmations[sid] || {};
                    const isAllConfirmed = conf.s1 && conf.s2 && conf.s3;
                    if (isAllConfirmed) confirmedCount++;
                    return { ...s, isAllConfirmed, conf };
                });

                const totalEl = document.getElementById('admin-total-count');
                if (totalEl) totalEl.innerHTML = `${students.length} <span class="text-sm font-normal opacity-80">คน</span>`;
                
                const confEl = document.getElementById('admin-confirmed-count');
                if (confEl) confEl.innerHTML = `${confirmedCount} <span class="text-sm font-normal opacity-80">คน</span>`;

                const formUrlInput = document.getElementById('admin-form-url-input');
                if (formUrlInput && document.activeElement !== formUrlInput) {
                    formUrlInput.value = window.state.settings.editFormUrl || '';
                }

                const tbody = document.getElementById('admin-table-body');
                if (tbody) {
                    tbody.innerHTML = studentStatusList.map(s => `
                        <tr class="hover:bg-slate-50/50 transition-colors">
                            <td class="py-4 pl-2">
                                <p class="font-black text-slate-800 text-sm">${s['1.1']}</p>
                                <p class="text-[11px] text-slate-500 font-medium mt-0.5">${s['1.2']}</p>
                            </td>
                            <td class="py-4 text-center">
                                ${s.conf.s1 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                            </td>
                            <td class="py-4 text-center">
                                ${s.conf.s2 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                            </td>
                            <td class="py-4 text-center">
                                ${s.conf.s3 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                            </td>
                            <td class="py-4 text-right pr-2">
                                ${s.isAllConfirmed 
                                    ? '<span class="inline-flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase border border-green-200"><i data-lucide="check" size="12"></i> สมบูรณ์</span>' 
                                    : '<span class="inline-flex items-center gap-1 px-3 py-1 bg-orange-50 text-orange-600 text-[10px] font-bold rounded-full uppercase border border-orange-200"><i data-lucide="clock" size="12"></i> รอดำเนินการ</span>'
                                }
                            </td>
                        </tr>
                    `).join('');
                    lucide.createIcons();
                }
            }
        };

        window.saveAdminSettings = async (e) => {
            e.preventDefault();
            const url = e.target.formUrl.value.trim();
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), { editFormUrl: url }, { merge: true });
                window.uiAlert("บันทึกลิงก์ Google Form เรียบร้อยแล้ว", "success");
            } catch (err) {
                window.uiAlert("เกิดข้อผิดพลาดในการบันทึก", "error");
            }
        };

        // --- Export Functions ---
        window.exportToExcel = () => {
            const students = window.state.sheetData;
            if(!students || students.length === 0) return window.uiAlert("ไม่มีข้อมูลให้ส่งออก", "error");
            
            const exportData = students.map(s => {
                const sid = s['1.1'];
                const conf = window.state.confirmations[sid] || {};
                const isAllConfirmed = conf.s1 && conf.s2 && conf.s3;
                return {
                    'รหัสนักศึกษา': s['1.1'],
                    'ชื่อ-นามสกุล': s['1.2'],
                    'ส่วนที่ 1 (ส่วนตัว)': conf.s1 ? 'ยืนยันแล้ว' : 'รอดำเนินการ',
                    'ส่วนที่ 2 (วิทยานิพนธ์)': conf.s2 ? 'ยืนยันแล้ว' : 'รอดำเนินการ',
                    'ส่วนที่ 3 (ไฟล์ภาพ)': conf.s3 ? 'ยืนยันแล้ว' : 'รอดำเนินการ',
                    'สถานะรวม': isAllConfirmed ? 'สมบูรณ์' : 'รอดำเนินการ'
                };
            });
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Students Status");
            XLSX.writeFile(wb, "ThesisCheck_Data.xlsx");
        };

        // สร้าง HTML แนวตั้ง (A4 Portrait = 794x1123 px) สำหรับถ่ายภาพ
        const generateExportPagesHTML = () => {
            const students = window.state.sheetData;
            const confirmations = window.state.confirmations;
            const rowsPerPage = 20; // ปรับเพิ่มจำนวนแถวต่อหน้าเนื่องจากเป็นแนวตั้ง
            const pagesHtml = [];
            const totalPages = Math.ceil(students.length / rowsPerPage) || 1;
            const timestamp = new Date().toLocaleString('th-TH');

            for (let i = 0; i < totalPages; i++) {
                const chunk = students.slice(i * rowsPerPage, (i + 1) * rowsPerPage);
                
                const rowsHtml = chunk.map(s => {
                    const sid = s['1.1'];
                    const conf = confirmations[sid] || {};
                    const isAllConfirmed = conf.s1 && conf.s2 && conf.s3;
                    
                    const getStatusHtml = (status) => status ? 
                        `<span style="color: #16a34a; font-weight: bold; font-size: 13px;">✔</span>` :

        window.openExportPreview = async () => {
            const students = window.state.sheetData;
            if(!students || students.length === 0) return window.uiAlert("ไม่มีข้อมูลให้ส่งออก", "error");

            window.state.showPreviewModal = true;
            window.updatePreviewModalUI();
            
            const previewContainer = document.getElementById('preview-images-container');
            const loadingText = document.getElementById('preview-loading-text');
            if(previewContainer) previewContainer.innerHTML = ''; 
            if(loadingText) loadingText.classList.remove('hidden');
            
            window.cachedExportDataURLs = [];
            
            try {
                await document.fonts.ready;
                const pagesHtml = generateExportPagesHTML();
                const renderer = document.getElementById('offscreenRenderer');
                
                for (let i = 0; i < pagesHtml.length; i++) {
                    renderer.innerHTML = pagesHtml[i];
                    const wrap = renderer.querySelector(`[id^="capture-layout-wrapper"]`);
                    void wrap.offsetWidth; 
                    
                    // รอให้ฟอนต์หรือสไตล์ปรับตัว
                    await new Promise(r => setTimeout(r, 500)); 
                    
                    const dataUrl = await htmlToImage.toPng(wrap, {
                        quality: 1, pixelRatio: 2, cacheBust: true, useCORS: true, backgroundColor: '#ffffff',
                        filter: (node) => {
                            if (node.tagName === 'LINK' || node.tagName === 'STYLE') {
                                try { if (node.sheet && node.sheet.cssRules) return true; } catch (e) { return false; }
                            }
                            return true;
                        }
                    });
                    
                    window.cachedExportDataURLs.push(dataUrl);
                    
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = "max-w-full h-auto rounded-xl shadow-lg border border-slate-200 fade-in";
                    if(previewContainer) previewContainer.appendChild(img);
                }
            } catch (e) { 
                console.error(e);
                window.uiAlert("การพรีวิวล้มเหลว: " + e.message, "error"); 
            } finally { 
                if(loadingText) loadingText.classList.add('hidden');
            }
        };

        window.closeExportPreview = () => {
            window.state.showPreviewModal = false;
            window.updatePreviewModalUI();
        };

        window.downloadFromPreview = (type) => {
            if (!window.cachedExportDataURLs.length) return;
            const dateStr = new Date().toISOString().split('T')[0];
            const baseName = `ThesisCheck_Report_${dateStr}`;
            
            if (type === 'image') {
                window.cachedExportDataURLs.forEach((url, idx) => {
                    const a = document.createElement('a'); 
                    a.download = `${baseName}_Page${idx+1}.png`; 
                    a.href = url; 
                    a.click();
                });
            } else {
                // สร้าง PDF แนวตั้ง (Portrait) ขนาด A4
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF('p', 'px', [794, 1123]);
                window.cachedExportDataURLs.forEach((url, idx) => {
                    if (idx > 0) pdf.addPage([794, 1123], 'p');
                    pdf.addImage(url, 'PNG', 0, 0, 794, 1123);
                });
                pdf.save(`${baseName}.pdf`);
            }
        };

        window.uiAlert = (message, type = 'info') => {
            window.state.modal = { show: true, title: type === 'error' ? 'ข้อผิดพลาด' : type === 'success' ? 'สำเร็จ' : 'แจ้งเตือน', message, type };

                        </div>

                        <div class="bg-white p-6 md:p-8 rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-end mb-6 gap-4">
                                <h2 class="text-xl font-black text-slate-800 flex items-center gap-2">
                                    <i data-lucide="list" class="text-indigo-600"></i> รายชื่อนักศึกษา
                                </h2>
                                <div class="flex flex-wrap gap-2">
                                    <button onclick="window.exportToExcel()" class="flex items-center gap-1.5 px-4 py-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded-xl transition-colors text-xs font-bold uppercase tracking-wider border border-emerald-200">
                                        <i data-lucide="file-spreadsheet" size="16"></i> Excel
                                    </button>
                                    <button onclick="window.openExportPreview()" class="flex items-center gap-1.5 px-4 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-xl transition-colors text-xs font-bold uppercase tracking-wider shadow-md">
                                        <i data-lucide="printer" size="16"></i> พรีวิว & ส่งออก (PDF/PNG)
                                    </button>
                                </div>
                            </div>
                            
                            <div id="export-table-container" class="overflow-x-auto custom-scrollbar p-1 -mx-1">
                                <table class="w-full min-w-[600px] text-left border-collapse">
                                    <thead class="border-b-2 border-slate-100 text-[10px] font-black uppercase text-slate-400 tracking-wider">
                                        <tr>
                                            <th class="pb-4 pl-2">รหัส / ชื่อ</th>
                                            <th class="pb-4 text-center">ส่วนที่ 1</th>
                                            <th class="pb-4 text-center">ส่วนที่ 2</th>
                                            <th class="pb-4 text-center">ส่วนที่ 3</th>
                                            <th class="pb-4 text-right pr-2">สถานะรวม</th>
                                        </tr>
                                    </thead>
                                    <tbody id="admin-table-body" class="divide-y divide-slate-50">
                                        ${studentStatusList.map(s => `
                                            <tr class="hover:bg-slate-50/50 transition-colors">
                                                <td class="py-4 pl-2">
                                                    <p class="font-black text-slate-800 text-sm">${s['1.1']}</p>
                                                    <p class="text-[11px] text-slate-500 font-medium mt-0.5">${s['1.2']}</p>
                                                </td>
                                                <td class="py-4 text-center">
                                                    ${s.conf.s1 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                                                </td>
                                                <td class="py-4 text-center">
                                                    ${s.conf.s2 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                                                </td>
                                                <td class="py-4 text-center">
                                                    ${s.conf.s3 ? '<i data-lucide="check-circle-2" size="20" class="text-green-500 mx-auto"></i>' : '<i data-lucide="circle" size="20" class="text-slate-200 mx-auto"></i>'}
                                                </td>
                                                <td class="py-4 text-right pr-2">
                                                    ${s.isAllConfirmed 
                                                        ? '<span class="inline-flex items-center gap-1 px-3 py-1 bg-green-100 text-green-700 text-[10px] font-bold rounded-full uppercase border border-green-200"><i data-lucide="check" size="12"></i> สมบูรณ์</span>' 
                                                        : '<span class="inline-flex items-center gap-1 px-3 py-1 bg-orange-50 text-orange-600 text-[10px] font-bold rounded-full uppercase border border-orange-200"><i data-lucide="clock" size="12"></i> รอดำเนินการ</span>'
                                                    }
                                                </td>
                                            </tr>
                                        `).join('')}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>
                </div>
            `;
        }

        function renderUIModal() {
            if (!window.state.modal.show) return "";
            return `
                <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[9999] flex items-center justify-center p-6 page-transition">
                    <div class="bg-white rounded-[2.5rem] p-8 max-w-sm w-full text-center shadow-2xl border border-white">
                        <div class="w-16 h-16 ${window.state.modal.type === 'error' ? 'bg-red-50 text-red-500' : window.state.modal.type === 'success' ? 'bg-green-50 text-green-500' : 'bg-indigo-50 text-indigo-600'} rounded-3xl flex items-center justify-center mx-auto mb-5 shadow-inner">
                            <i data-lucide="${window.state.modal.type === 'error' ? 'alert-octagon' : window.state.modal.type === 'success' ? 'check-circle' : 'info'}" size="32"></i>
                        </div>
                        <h3 class="text-lg font-black text-slate-800 mb-2 leading-tight">${window.state.modal.title}</h3>
                        <p class="text-sm text-slate-500 font-medium leading-relaxed">${window.state.modal.message}</p>
                        <button onclick="window.closeModal()" class="w-full mt-6 py-4 bg-slate-900 text-white font-bold rounded-2xl shadow-lg hover:bg-black active:scale-95 transition-all">ตกลง</button>
                    </div>
                </div>
            `;
        }

        function renderPreviewModal() {
            if (!window.state.showPreviewModal) return "";
            return `
                <div class="fixed inset-0 z-[120] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm page-transition">
                    <div class="bg-white rounded-3xl shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden">
                        
                        <div class="flex justify-between items-center p-5 sm:px-6 border-b border-slate-100 shrink-0">
                            <h3 class="text-xl font-black text-slate-800 flex items-center gap-2">
                                <i data-lucide="eye" class="text-indigo-500"></i> พรีวิวข้อมูลก่อนส่งออก
                            </h3>
                            <button onclick="window.closeExportPreview()" class="p-2 text-slate-400 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x"></i></button>
                        </div>
                        
                        <div class="flex-1 overflow-auto bg-[#e2e8f0] p-4 sm:p-8 flex flex-col items-center gap-6 relative">
                            <div id="preview-loading-text" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 flex flex-col items-center text-slate-500">
                                <div class="w-8 h-8 border-4 border-slate-300 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                                <span class="font-bold text-sm tracking-widest uppercase">กำลังสร้างภาพพรีวิว...</span>
                            </div>
                            <div id="preview-images-container" class="flex flex-col gap-6 w-full items-center">
                                <!-- รูปภาพจะถูกเพิ่มมาที่นี่ -->
                            </div>
                        </div>

                        <div class="p-5 sm:px-6 border-t border-slate-100 bg-slate-50 flex flex-wrap justify-end gap-3 shrink-0">
                            <button onclick="window.closeExportPreview()" class="px-6 py-3 bg-white border border-slate-200 text-slate-700 rounded-xl font-bold shadow-sm transition-colors hover:bg-slate-100">ปิด</button>
                            <button onclick="window.downloadFromPreview('image')" class="flex items-center gap-2 px-6 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl font-bold shadow-sm transition-all active:scale-95"><i data-lucide="image" size="18"></i> โหลดเป็นรูปภาพ</button>
                            <button onclick="window.downloadFromPreview('pdf')" class="flex items-center gap-2 px-6 py-3 bg-rose-600 hover:bg-rose-700 text-white rounded-xl font-bold shadow-sm transition-all active:scale-95"><i data-lucide="file-pdf" size="18"></i> โหลดเป็น PDF</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (window.state.isLoading) return;

            let mainContent = '';
            if (window.state.view === 'login') {
                mainContent = renderLogin();
            } else if (window.state.view === 'student') {
                mainContent = renderStudentView();
            } else if (window.state.view === 'admin') {
                mainContent = renderAdminView();
            }

            app.innerHTML = mainContent;
            window.updateModalUI();
            window.updatePreviewModalUI();
            lucide.createIcons();
        }

        init();

    </script>
</body>
</html>
