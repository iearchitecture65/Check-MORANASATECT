        // ตั้งค่าเชื่อมต่อฐานข้อมูล Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD1z-AufMcsNqnbm3uUjoniuhdmDksYHMY",
            authDomain: "moranasatect.firebaseapp.com",
            projectId: "moranasatect",
            storageBucket: "moranasatect.firebasestorage.app",
            messagingSenderId: "592676930184",
            appId: "1:592676930184:web:a142d92aace735cff5153d",

        };

        const DEFAULT_LABELS = {

            "2.1": "2.1 ชื่อวิทยานิพนธ์ (ทั้งภาษาไทย และภาษาอังกฤษ)",
            "2.2": "2.2 ชื่ออาจารย์ที่ปรึกษา",

        };

        const DEFAULT_SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTRyI-a9eEarynPfuWWbpTqHvz-vDHBGnE1UnvqvDOGIAA9nWybOkfS2jlI3xJRrpFAuR5nmWup9169/pub?gid=1223023440&single=true&output=csv";

        window.state = {

            settings: {

                labels: { ...DEFAULT_LABELS }

            modal: { show: false, title: '', message: '', type: 'info' },
            showPreviewModal: false,
            showEditGuideModal: false,
            showLogsModal: false,
            showLinkPreviewModal: false,
            currentPreviewUrl: '',
            currentPreviewTitle: '',
            adminSettingsExpanded: false,
            // OTP State
            loginStep: 'id', // 'id' or 'otp'
            serverOtp: '',
            refCode: '',
            otpLoading: false,
            isSessionCheckDone: false // เพิ่มสถานะการตรวจสอบเซสชัน
        };

        window.cachedExportDataURLs = []; 

        window.checkSessionStatus = () => {
            if (window.state.view !== 'login' && window.state.loginTimestamp) {
                const now = Date.now();
                const diffMinutes = (now - window.state.loginTimestamp) / 1000 / 60;
                if (diffMinutes >= (window.state.settings.sessionDuration || 30)) {
                    window.logout();
                    window.uiAlert("เซสชันหมดอายุเนื่องจากใช้งานครบเวลาที่กำหนด โปรดเข้าสู่ระบบใหม่อีกครั้ง", "info");
                }
            }
        };

        setInterval(() => window.checkSessionStatus(), 10000);

        // ปรับปรุงฟังก์ชันแสดงผลลิงก์ให้แสดงเป็นชื่อไฟล์ และเปิด Link Preview
        window.formatValue = (text) => {
            if (!text || text.trim() === '') return '<span class="text-slate-300 italic">ไม่มีข้อมูล</span>';
            
            // ป้องกัน XSS เบื้องต้น
            let safeText = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
            
            // แยกประมวลผลทีละบรรทัด เพื่อดึงข้อความด้านหน้าลิงก์มาใช้เป็นชื่อปุ่ม
            let lines = safeText.split('\n');
            let formattedLines = lines.map(line => {
                if (!line.trim()) return ''; // ข้ามบรรทัดว่าง

                // ใช้ Regex ดึงข้อความหน้าลิงก์ (prefix), ลิงก์ (url), และข้อความหลังลิงก์ (suffix)
                const lineRegex = /^(.*?)(https?:\/\/[^\s]+)(.*)$/;
                const match = line.match(lineRegex);

                if (match) {
                    let prefix = match[1].trim();
                    let url = match[2];
                    let suffix = match[3];

                    let label = prefix;
                    // ตัดเครื่องหมาย : (colon) ด้านหลังข้อความออก
                    if (label.endsWith(':')) {
                        label = label.substring(0, label.length - 1).trim();
                    }

                    // ใช้ข้อความด้านหน้าเป็นชื่อปุ่ม ถ้าไม่มีให้ใช้คำเริ่มต้น
                    let buttonText = label;
                    if (!buttonText) {
                        buttonText = "ดูไฟล์แนบ";
                    }

                    let safeFileName = buttonText.replace(/'/g, "\\'");

                    // สร้างปุ่มที่เล็กลง สมส่วน และมีระยะห่าง (ml-3)
                    let btnHtml = `<button onclick="window.openLinkPreview('${url}', '${safeFileName}')" class="text-indigo-600 hover:text-indigo-800 break-all font-bold inline-flex items-center justify-center gap-1 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1 rounded border border-indigo-200 transition-colors shadow-sm cursor-pointer ml-3 align-middle">
                        <i data-lucide="external-link" size="12" class="text-indigo-600 shrink-0"></i> 
                        <span class="text-[11px] leading-none pt-[1px]">${buttonText}</span>
                    </button>`;

                    let content = '';
                    if (label) {
                        // แสดงคำอธิบาย (ไม่มี colon) เว้นวรรค แล้วตามด้วยปุ่ม
                        content = `<span class="font-semibold text-slate-700">${label}</span>` + btnHtml + (suffix ? ` ${suffix}` : '');
                    } else {
                        content = btnHtml + (suffix ? ` ${suffix}` : '');
                    }
                    return `<div class="mb-2 last:mb-0 leading-relaxed">${content}</div>`;
                }
                
                // กรณีบรรทัดนั้นมีลิงก์แต่ไม่ตรงแพทเทิร์นข้างบน (เช่น ไม่มีข้อความนำหน้า)
                let processedLine = line.replace(/(https?:\/\/[^\s]+)/g, function(url) {
                    return `<button onclick="window.openLinkPreview('${url}', 'เปิดลิงก์')" class="text-indigo-600 hover:text-indigo-800 break-all font-bold inline-flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 px-2.5 py-1 rounded border border-indigo-200 transition-colors shadow-sm cursor-pointer mx-1 align-middle">
                        <i data-lucide="external-link" size="12" class="text-indigo-600 shrink-0"></i> 
                        <span class="text-[11px] leading-none pt-[1px]">เปิดลิงก์</span>
                    </button>`;
                });
                return `<div class="mb-2 last:mb-0 leading-relaxed">${processedLine}</div>`;
            });
            
            return formattedLines.join('');
        };

        function parseCSV(str) {
            const arr = [];
            let quote = false;
            let row = 0, col = 0;
            for (let c = 0; c < str.length; c++) {
                let cc = str[c], nc = str[c+1];
                arr[row] = arr[row] || [];
                arr[row][col] = arr[row][col] || '';
                if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
                if (cc == '"') { quote = !quote; continue; }
                if (cc == ',' && !quote) { ++col; continue; }
                if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
                if (cc == '\n' && !quote) { ++row; col = 0; continue; }
                if (cc == '\r' && !quote) { ++row; col = 0; continue; }
                arr[row][col] += cc;
            }
            return arr;
        }

        async function fetchSheetData(isBackgroundPoll = false) {
            try {
                const fetchUrl = (window.state.settings.sheetUrl || DEFAULT_SHEET_URL) + "&t=" + new Date().getTime();
                const response = await fetch(fetchUrl);
                if (!response.ok) throw new Error("HTTP Status " + response.status);
                const csvText = await response.text();
                const parsed = parseCSV(csvText);
                
                if (parsed.length > 0) {
                    const headers = parsed[0];
                    const dataRows = parsed.slice(1);
                    
                    const prefixes = ['0', '1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '2.4', '3.1', '3.2', '3.3'];
                    const headerMap = {};
                    prefixes.forEach(p => headerMap[p] = []);

                    headers.forEach((header, index) => {
                        prefixes.forEach(p => { 
                            const regex = new RegExp(`(^|\\s)${p}(\\s|:|\\.|$)`);
                            if (regex.test(header)) headerMap[p].push(index); 
                        });
                    });

                    const newData = dataRows.map(row => {
                        let obj = {};
                        const emailIdx = headerMap['0'][0];
                        obj.email = (emailIdx !== undefined && row[emailIdx]) ? row[emailIdx].trim() : '';
                        
                        const dataPrefixes = ['1.1', '1.2', '1.3', '2.1', '2.2', '2.3', '2.4', '3.1', '3.2', '3.3'];
                        dataPrefixes.forEach(p => {
                            let values = headerMap[p].map(idx => row[idx] ? row[idx].trim() : '').filter(v => v !== '');
                            obj[p] = values.join('\n\n'); 
                        });
                        return obj;
                    }).filter(row => row['1.1'] && row['1.1'] !== '');

                    const isDataChanged = JSON.stringify(window.state.sheetData) !== JSON.stringify(newData);

                    if (isDataChanged && newData.length > 0) {
                        window.state.sheetData = newData;
                        if (window.state.studentId) {
                            window.state.currentStudentData = window.state.sheetData.find(row => row['1.1'] === window.state.studentId) || window.state.currentStudentData;
                        }
                        if (!window.state.isLoading) {
                            window.softUpdateUI();
                            window.verifyConfirmationsAgainstData();
                        }
                    }
                }
            } catch (error) {
                if (!isBackgroundPoll) {
                    console.error("Error fetching sheet:", error);
                }
            }
        }

        // ฟังก์ชันช่วยในการบันทึกประวัติการเข้าใช้งาน
        async function logActivity(sid, adminMode) {
            if (!window.state.user) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), {
                    studentId: sid,
                    type: adminMode ? 'admin' : 'student',
                    timestamp: Date.now(),
                    userAgent: navigator.userAgent
                });
            } catch (e) {
                console.error("Failed to log activity", e);
            }
        }

        async function init() {
            try {
                // พยายามลงชื่อเข้าใช้เบื้องหลัง
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try { await signInWithCustomToken(auth, __initial_auth_token); } 
                    catch (customTokenError) { await signInAnonymously(auth); }
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, async (u) => {
                    window.state.user = u;
                    if (u) {
                        // เริ่มดึงข้อมูลเบื้องหลัง
                        listenToData();
                        
                        // ตรวจสอบเซสชัน
                        if (window.state.isRestoringSession) {
                            await tryRestoreSession();
                            window.state.isRestoringSession = false;
                        }
                        
                        // สำคัญ: ปลดล็อค isLoading เมื่อ Auth และ Session Check พื้นฐานเสร็จ
                        window.state.isSessionCheckDone = true;
                        window.state.isLoading = false; 
                        render(); // สั่งเรนเดอร์ทันทีไม่ต้องรอ Firestore Document

                        const pollData = async () => {
                            await fetchSheetData(true); 
                            window.pollingTimer = setTimeout(pollData, 5000);
                        };
                        if (window.pollingTimer) clearTimeout(window.pollingTimer);
                        window.pollingTimer = setTimeout(pollData, 1000);
                    } else {
                        // ถ้าไม่มี User ให้แสดงหน้า Login
                        window.state.isLoading = false;
                        render();
                    }
                });
            } catch (err) { 
                console.error("Firebase Auth Error:", err);
                window.state.isLoading = false;
                render();
            }
        }

        async function tryRestoreSession() {
            if (!window.state.user) return;
            try {
                const sessionDoc = await getDoc(doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'system', 'session'));
                if (sessionDoc.exists()) {
                    const data = sessionDoc.data();
                    const now = Date.now();
                    const diffMinutes = (now - data.loginTimestamp) / 1000 / 60;
                    
                    const limit = data.sessionDuration || window.state.settings.sessionDuration || 30;
                    
                    if (diffMinutes < limit) {
                        window.state.studentId = data.studentId;
                        window.state.isAdmin = data.isAdmin;
                        window.state.currentStudentData = data.currentStudentData;
                        window.state.loginTimestamp = data.loginTimestamp;
                        window.state.view = data.isAdmin ? 'admin' : 'student';
                    } else {
                        await deleteDoc(doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'system', 'session'));
                    }
                }
            } catch (e) {
                console.error("Restore session error", e);
            }
        }

        function listenToData() {
            if (!window.state.user) return;
            
            // Listen for settings
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'settings', 'config'), (s) => {
                const oldSheetUrl = window.state.settings.sheetUrl;
                if (s.exists()) {
                    const data = s.data();
                    window.state.settings.editFormUrl = data.editFormUrl ?? window.state.settings.editFormUrl;
                    window.state.settings.sheetUrl = data.sheetUrl ?? window.state.settings.sheetUrl;
                    window.state.settings.sessionDuration = data.sessionDuration ?? window.state.settings.sessionDuration;
                    window.state.settings.labels = { ...window.state.settings.labels, ...(data.labels || {}) };
                }

                if (oldSheetUrl !== window.state.settings.sheetUrl || window.state.sheetData.length === 0) {
                    fetchSheetData(false);
                }

                if (!window.state.isLoading) {
                    window.softUpdateUI();
                }
            }, (error) => { 
                console.error("Settings Snapshot error:", error); 
            });

            // Listen for confirmations
            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'system', 'confirmations'), (s) => {
                if (s.exists()) {
                    window.state.confirmations = s.data();
                    if (!window.state.isLoading) {
                        window.softUpdateUI();
                        window.verifyConfirmationsAgainstData();
                    }
                }
            }, (error) => { console.error("Confirmations Snapshot error:", error); });

            // Listen for logs (ประวัติการเข้าใช้งาน)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'logs'), (s) => {
                window.state.logs = s.docs.map(d => d.data());
                if (window.state.view === 'admin') {
                    window.softUpdateAdminUI();
                }
            }, (error) => { console.error("Logs Snapshot error:", error); });
        }

        window.softUpdateAdminUI = () => {
             if (window.state.view === 'admin') {
                render();
            }
        };

        // --- OTP Actions ---
        window.requestOtp = async (e) => {
            if (e) e.preventDefault();
            const inputId = document.getElementById('login_id').value.trim();
            
            // ตรวจสอบว่าเป็น Admin หรือไม่ (ข้าม OTP ทันที)
            if (inputId === "65030900") {
                window.state.isAdmin = true;
                window.state.studentId = inputId;
                window.state.view = 'admin';
                window.state.loginTimestamp = Date.now();
                window.state.currentStudentData = null;

                if (window.state.user) {
                    try {
                        // บันทึกประวัติการเข้างาน Admin
                        await logActivity(inputId, true);
                        
                        await setDoc(doc(db, 'artifacts', appId, 'users', window.state.user.uid, 'system', 'session'), {
                            studentId: window.state.studentId,
                            isAdmin: true,
                            loginTimestamp: window.state.loginTimestamp,
                            currentStudentData: null,
                            sessionDuration: window.state.settings.sessionDuration
                        });

            let hasChanges = false;

            window.state.sheetData.forEach(row => {

                if (currentConf[sid]) {
                    const s1_hash = `${row['1.1']}|${row['1.2']}|${row['1.3']}`;
                    const s2_hash = `${row['2.1']}|${row['2.2']}|${row['2.3']}|${row['2.4']}`;
                    const s3_hash = `${row['3.1']}|${row['3.2']}|${row['3.3']}`;

                    if (currentConf[sid].s1 && currentConf[sid].s1_hash && currentConf[sid].s1_hash !== s1_hash) {
                        currentConf[sid].s1 = false;
                        hasChanges = true;
                        if(window.state.studentId === sid) currentStudentUnchecked = true;

                    if (currentConf[sid].s2 && currentConf[sid].s2_hash && currentConf[sid].s2_hash !== s2_hash) {

        window.downloadFromPreview = (type) => {
            if (!window.cachedExportDataURLs.length) return;
            const dateStr = new Date().toISOString().split('T')[0];
            const baseName = `ThesisCheck_Report_${dateStr}`;
            
            if (type === 'image') {
                window.cachedExportDataURLs.forEach((url, idx) => {
                    const a = document.createElement('a'); 
                    a.download = `${baseName}_Page${idx+1}.png`; 
                    a.href = url; 
                    a.click();
                });
            } else {
                const { jsPDF } = window.jspdf;
                const pdf = new jsPDF({
                    orientation: 'p',
                    unit: 'px',
                    format: [794, 1123],
                    compress: true 
                });
                
                window.cachedExportDataURLs.forEach((url, idx) => {
                    if (idx > 0) pdf.addPage([794, 1123], 'p');
                    pdf.addImage(url, 'PNG', 0, 0, 794, 1123, undefined, 'FAST');
                });
                pdf.save(`${baseName}.pdf`);
            }
        };

        function renderLinkPreviewModal() {
            if (!window.state.showLinkPreviewModal) return "";
            
            let originalUrl = window.state.currentPreviewUrl;
            let displayUrl = originalUrl;
            let contentHtml = '';
            let useIframe = false;

            // 1. ดึง ID จากลิงก์ Google Drive ทุกรูปแบบ เพื่อเอาไปใช้ฝัง iframe พรีวิว
            let driveId = '';
            if (displayUrl.includes('drive.google.com/file/d/')) {
                const match = displayUrl.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
                if (match) driveId = match[1];
            } else if (displayUrl.includes('drive.google.com/uc?') || displayUrl.includes('drive.google.com/open?')) {
                try {
                    const urlObj = new URL(displayUrl);
                    driveId = urlObj.searchParams.get('id');
                } catch(e) {}
            }

            if (driveId) {
                // บังคับแปลงลิงก์ Drive ทั้งหมดเป็นหน้าพรีวิว (แก้ปัญหาการถูกบล็อกเมื่อดึงเป็น <img> ตรงๆ)
                displayUrl = `https://drive.google.com/file/d/${driveId}/preview`;
                useIframe = true; 
            } else {
                // 2. เช็คว่าเป็นไฟล์รูปทั่วไปหรือไม่
                const isImageExtension = displayUrl.match(/\.(jpeg|jpg|gif|png|webp|svg)(\?.*)?$/i);
                if (!isImageExtension) {
                    useIframe = true; // ถ้าไม่ใช่รูปทั่วไป ให้ฝังเป็นเว็บ
                }
            }

            if (!useIframe) {
                // กรณีที่เป็นรูปภาพ (img tag)
                const safeId = "err-" + Math.random().toString(36).substr(2, 9);
                
                contentHtml = `
                    <div class="w-full h-full flex items-center justify-center bg-slate-100/50 p-2 sm:p-4 overflow-hidden relative">
                        <!-- พยายามโหลดรูปก่อน -->
                        <img src="${displayUrl}" class="max-w-full max-h-full object-contain rounded-xl shadow-sm z-10" alt="Preview"
                             onerror="this.style.display='none'; document.getElementById('${safeId}').classList.remove('hidden'); lucide.createIcons();">
                        
                        <!-- ถ้าโหลดรูปไม่ขึ้นจริงๆ จะแสดงปุ่มตรงนี้แทน -->
                        <div id="${safeId}" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-slate-50 z-20 p-6 text-center">
                            <div class="w-16 h-16 bg-slate-200 text-slate-400 rounded-2xl flex items-center justify-center mb-4 shadow-inner">
                                <i data-lucide="image-off" size="32"></i>
                            </div>
                            <p class="font-bold text-slate-700 text-sm mb-1">ไม่สามารถดึงรูปภาพมาแสดงผลได้</p>
                            <p class="text-xs text-slate-500 mb-6 max-w-xs">อาจเกิดจากการตั้งค่าความปลอดภัยของเซิร์ฟเวอร์ หรือเบราว์เซอร์บล็อกการโหลดข้ามโดเมน</p>
                            <a href="${originalUrl}" target="_blank" class="inline-flex items-center gap-2 px-5 py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-xs font-bold shadow-md transition-all active:scale-95 uppercase tracking-wide">
                                <i data-lucide="external-link" size="16"></i> คลิกเพื่อเปิดดูรูปภาพ
                            </a>
                        </div>
                    </div>
                `;
            } else {
                // กรณีฝังลิงก์ Google Drive หรือหน้าเว็บอื่นๆ (iframe tag)
                contentHtml = `
                    <div class="w-full h-full bg-slate-50 relative">
                        <div class="absolute inset-0 flex flex-col items-center justify-center z-0 pointer-events-none opacity-50">
                            <div class="animate-spin rounded-full h-8 w-8 border-2 border-indigo-500 border-t-transparent mb-2"></div>
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">กำลังโหลดเนื้อหา...</span>
                        </div>
                        <iframe src="${displayUrl}" class="w-full h-full border-0 relative z-10" allowfullscreen></iframe>
                    </div>
                `;
            }

            return `
                <div class="fixed inset-0 z-[9999] flex items-center justify-center p-2 sm:p-4 bg-slate-900/80 backdrop-blur-sm page-transition">
                    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[85vh] sm:h-[90vh] flex flex-col overflow-hidden relative">
                        
                        <!-- Header -->
                        <div class="flex justify-between items-center p-3 border-b border-slate-100 bg-white shrink-0 z-20 shadow-sm relative">
                            <!-- Left: File Name (Text only) -->
                            <div class="flex items-center gap-2 px-2 text-slate-700 font-bold text-[13px] truncate">
                                <i data-lucide="file-text" size="16" class="text-indigo-500 shrink-0"></i>
                                <span class="truncate max-w-[200px] sm:max-w-md">${window.state.currentPreviewTitle}</span>
                            </div>
                            
                            <!-- Right: Close -->
                            <button onclick="window.closeLinkPreview()" class="flex items-center justify-center w-8 h-8 bg-slate-100 text-slate-500 hover:bg-red-100 hover:text-red-600 rounded-full transition-colors shrink-0" title="ปิดหน้าต่าง">
                                <i data-lucide="x" size="18"></i>
                            </button>
                        </div>
                        
                        <!-- Body (Preview Content) -->
                        <div class="flex-1 overflow-hidden relative bg-slate-100">
                            ${contentHtml}
                        </div>
                    </div>
                </div>
            `;
        }

                        <div class="flex justify-between items-center p-4 sm:px-5 border-b border-slate-100 shrink-0">
                            <h3 class="text-[15px] font-black text-slate-800 flex items-center gap-2">
                                <i data-lucide="eye" class="text-indigo-500" size="18"></i> พรีวิวข้อมูลก่อนส่งออก
                            </h3>
                            <button onclick="window.closeExportPreview()" class="p-1.5 text-slate-400 hover:bg-slate-100 rounded-full transition-colors"><i data-lucide="x" size="18"></i></button>
                        </div>
                        
                        <div class="flex-1 overflow-auto bg-[#e2e8f0] p-4 flex flex-col items-center relative min-h-[400px]">
                            <div id="preview-loading-text" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 z-10 bg-slate-100/50 backdrop-blur-[2px]">
                                <div class="w-10 h-10 border-4 border-slate-300 border-t-indigo-600 rounded-full animate-spin mb-3"></div>
                                <span class="font-bold text-[11px] tracking-widest uppercase text-slate-600">ระบบกำลังประมวลผลและบีบอัดข้อมูล...</span>
                                <p class="text-[9px] text-slate-400 mt-2 italic">โปรดรอสักครู่ ขั้นตอนนี้อาจใช้เวลา 3-5 วินาที</p>
                            </div>
                            
                            <div id="preview-images-container" class="flex flex-col gap-6 w-full items-center py-4">
                            </div>
                        </div>

                        <div class="p-4 sm:px-5 border-t border-slate-100 bg-white flex flex-wrap justify-end gap-2 shrink-0 z-20">
                            <button onclick="window.closeExportPreview()" class="px-4 py-2.5 bg-slate-100 text-slate-600 rounded-lg text-[11px] font-black shadow-sm transition-colors hover:bg-slate-200 uppercase tracking-wider">ยกเลิก</button>
                            <button onclick="window.downloadFromPreview('image')" class="flex items-center gap-1.5 px-4 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-[11px] font-black shadow-md transition-all active:scale-95 uppercase tracking-wider"><i data-lucide="image" size="14"></i> บันทึกรูปภาพ</button>
                            <button onclick="window.downloadFromPreview('pdf')" class="flex items-center gap-1.5 px-4 py-2.5 bg-rose-600 hover:bg-rose-700 text-white rounded-lg text-[11px] font-black shadow-md transition-all active:scale-95 uppercase tracking-wider"><i data-lucide="file-pdf" size="14"></i> บันทึก PDF (บีบอัด)</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function render() {
            const app = document.getElementById('app');
            if (window.state.isLoading) return;

            let mainContent = '';
            if (window.state.view === 'login') {
                mainContent = renderLogin();
            } else if (window.state.view === 'student') {
                mainContent = renderStudentView();
            } else if (window.state.view === 'admin') {
                mainContent = renderAdminView();
            }

            app.innerHTML = mainContent;
            window.updateModalUI();
            window.updatePreviewModalUI();
            window.updateEditGuideUI();
            window.updateLogsModalUI();
            window.updateLinkPreviewModalUI(); // เรนเดอร์ Modal ของ Link Preview
            lucide.createIcons();
        }

        init();

    </script>
</body>
</html>
